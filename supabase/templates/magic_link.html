<!--
  Supabase "Magic Link" email template.
  Variables available: {{ .ConfirmationURL }} {{ .Email }} {{ .SiteURL }} {{ .Token }}
  Set via Supabase Dashboard: Authentication -> Emails -> Magic Link
  (Itikaf uses email/password auth day-to-day, but Supabase can still send
  this for certain sign-in flows, so it's branded for consistency.)
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in to Itikaf</title>
</head>
<body style="margin:0; padding:0; background-color:#FBF3E7; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#FBF3E7; padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" style="max-width:440px;" cellpadding="0" cellspacing="0">
          <tr>
            <td align="center" style="padding-bottom:20px;">
              <img src="https://raw.githubusercontent.com/AbdisalanW/Itikaf/main/icons/icon-192.png"
                   width="56" height="56" alt="Itikaf"
                   style="display:block; border-radius:16px; box-shadow:0 8px 24px rgba(59,46,34,0.10);" />
            </td>
          </tr>
          <tr>
            <td style="background-color:#FFFFFF; border-radius:20px; padding:32px 28px; box-shadow:0 8px 24px rgba(59,46,34,0.10);">
              <h1 style="margin:0 0 12px; font-size:1.3rem; line-height:1.3; color:#3B2E22;">
                Sign in to Itikaf
              </h1>
              <p style="margin:0 0 24px; font-size:0.95rem; line-height:1.6; color:#5B4A38;">
                Tap below to sign in — no password needed. This link is only valid for a short
                while and can only be used once.
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 24px;">
                <tr>
                  <td align="center" style="border-radius:999px; background:linear-gradient(135deg,#E08D4B,#C96A3B); background-color:#E08D4B;">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block; padding:14px 32px; font-size:1rem; font-weight:600; color:#2A1B10; text-decoration:none; border-radius:999px;">
                      Sign in
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:0 0 8px; font-size:0.8rem; line-height:1.5; color:#9C8872;">
                If the button doesn't work, copy and paste this link into your browser:
              </p>
              <p style="margin:0; font-size:0.78rem; line-height:1.5; color:#C96A3B; word-break:break-all;">
                {{ .ConfirmationURL }}
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-top:20px;">
              <p style="margin:0; font-size:0.78rem; line-height:1.5; color:#9C8872;">
                If you didn't request this, you can safely ignore this email.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
